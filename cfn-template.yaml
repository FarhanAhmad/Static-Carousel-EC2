AWSTemplateFormatVersion: 2010-09-09

Parameters:
  SecurityKey:
    Type: AWS::EC2::KeyPair::KeyName
    Description: The security key for the application.
  
  LatestAMIId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Description: 'AMI ID for the latest Amazon Linux 2'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'

  MySecGroup:
    Type: AWS::EC2::SecurityGroup::GroupName
    

Resources:
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref SecurityKey
      ImageId: !Ref LatestAMIId
      SecurityGroups: 
        - !Ref MySecGroup
      Tags: 
        - Key: Name
          Value: !Sub Web Server of ${AWS::StackName}
      UserData: !Base64 |
        #! /bin/bash
        dnf update -y
        dnf install httpd -y
        dnf systemctl enable httpd
        FOLDER="https://raw.githubusercontent.com/FarhanAhmad/Static-Carousel-EC2/refs/heads/master/static-web"
        cd /var/www/html
        wget ${FOLDER}/index.html
        wget ${FOLDER}/cat0.jpg
        wget ${FOLDER}/cat1.jpg
        wget ${FOLDER}/cat2.jpg
        systemctl start httpd
Outputs:
  WebServerPublicDNS:
    Description: The public DNS of the web server.
    Value: !Sub
    - http://${PublicDNS}
    - PublicDNS: !GetAtt WebServer.PublicDnsName